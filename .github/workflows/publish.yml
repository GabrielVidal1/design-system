name: Publish to npm

# Push a version tag to release @gabvdl/ui to the public npm registry:
#
#   git tag v0.0.14 && git push github v0.0.14
#
# The tag must match packages/ui/package.json's version exactly (guarded
# below). Pre-release tags (v1.0.0-rc.1) publish under the `next` dist-tag
# so they never become `latest`.
#
# Auth, in order of preference:
#
#   1. Trusted publishing (OIDC) — no secret at all. Register this workflow at
#      npmjs.com/package/@gabvdl/ui/access once the package exists, then delete
#      the NPM_TOKEN secret: npm authenticates from the id-token below.
#   2. NPM_TOKEN secret — a *granular* access token with **"Bypass two-factor
#      authentication" ticked**. Without that box npm answers EOTP (it wants an
#      authenticator code), and classic "Automation" tokens no longer exist.
#
# setup-node's `registry-url` is deliberately NOT set: it writes an .npmrc
# holding `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`, and with no
# token that line expands to an empty credential — npm then sends blank auth
# and the registry answers 404 rather than falling back to OIDC. The token
# path below writes that line itself, so it only ever exists when there is a
# token to put in it.

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance + trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Node 22 ships npm 10.x; trusted publishing needs >= 11.5.1.
      - run: npm install -g npm@latest

      - name: Check tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(node -p "require('./packages/ui/package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::tag v$TAG != @gabvdl/ui version $VERSION — bump packages/ui/package.json first"
            exit 1
          fi

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:ui

      - name: Publish @gabvdl/ui
        working-directory: packages/ui
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "publishing with the NPM_TOKEN secret"
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> "$HOME/.npmrc"
          else
            echo "no NPM_TOKEN secret — publishing via trusted publishing (OIDC)"
          fi
          TAG="${GITHUB_REF_NAME#v}"
          case "$TAG" in
            *-*) DIST_TAG=next ;;
            *)   DIST_TAG=latest ;;
          esac
          # If this ever dies with ENEEDAUTH, re-run with --loglevel verbose: a
          # failed OIDC exchange is silent otherwise, and the `npm verbose oidc`
          # line carries the actual reason.
          npm publish --access public --provenance --tag "$DIST_TAG"

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
